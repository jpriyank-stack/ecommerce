name: CI/CD Pipeline

# When to run this workflow
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ========== JOB 1: TEST ==========
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      # Step 1: Get your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Step 2: Install Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
      
      # Step 4: Check code quality (optional)
      - name: Run linter
        run: npm run lint --if-present
      
      # Step 5: Run tests
      - name: Run tests
        run: npm test --if-present
  
  # ========== JOB 2: BUILD DOCKER IMAGE ==========
  build:
    needs: test  # Only run if test job passes
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Step 2: Setup Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Step 4: Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}
  
  # ========== JOB 3: DEPLOY (Optional) ==========
  deploy:
    needs: build  # Only run if build job passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy notification
        run: echo "✅ Deployment would happen here"