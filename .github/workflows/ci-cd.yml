name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ========== JOB 1: TEST ==========
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # CREATE .env FROM GITHUB SECRETS
      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          PORT=8080
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          EOF
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linter
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test --if-present
  
  # ========== JOB 2: BUILD & PUSH ==========
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # CREATE .env FROM GITHUB SECRETS FOR DOCKER BUILD
      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          PORT=8080
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          EOF
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:buildcache,mode=max
  
  # ========== JOB 3: NOTIFY ==========
  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Success Notification 
        run: echo "✅ CI/CD Pipeline completed successfully!"

  # ========== JOB 4: DEPLOY TO EC2 ==========
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_KEY }}
          script: |
            echo "=========================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=========================================="
            
            echo "📝 Logging into Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            echo "📥 Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            
            echo "⏹️  Stopping old container..."
            docker stop ecommerce-backend 2>/dev/null || echo "No running container"
            docker rm ecommerce-backend 2>/dev/null || echo "No container to remove"
            
            echo "🏃 Starting new container..."
            docker run -d \
              --name ecommerce-backend \
              -p 8080:8080 \
              --env-file ~/.env \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            
            echo "⏳ Waiting for container..."
            sleep 5
            
            echo "🔍 Checking container status..."
            if docker ps | grep -q ecommerce-backend; then
              echo "✅ Container is running!"
              docker ps | grep ecommerce-backend
            else
              echo "❌ Container failed to start!"
              docker logs ecommerce-backend
              exit 1
            fi
            
            echo ""
            echo "=========================================="
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "=========================================="
            echo ""
            echo "🌐 Your app is live at:"
            echo "   http://${{ secrets.AWS_EC2_IP }}:8080"
            echo ""