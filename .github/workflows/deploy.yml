name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_KEY }}
          script: |
            cd ~/ecommerce-backend || mkdir -p ~/ecommerce-backend && cd ~/ecommerce-backend
            
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            
            docker stop ecommerce-backend || true
            docker rm ecommerce-backend || true
            
            docker run -d \
              --name ecommerce-backend \
              -p 8080:8080 \
              -e NODE_ENV=production \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            
            docker ps | grep ecommerce-backend
